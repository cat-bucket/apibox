<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinAI</title>
  <meta name="description" content="极简 AI 对话客户端，本地运行，即开即用。" />
  <link rel="icon" href="/assets/ai-avatar.png" />
  <link rel="stylesheet" href="/styles.css?v=20260516-dark-ghost-fix" />
</head>
<body>
  <main class="app-shell" id="appShell">

    <!-- 侧边栏 -->
    <aside class="side-panel" id="sidePanel" aria-label="会话列表">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img src="/assets/ai-avatar.png" alt="" />
        </div>
        <div class="brand-copy">
          <strong>MinAI</strong>
          <small>本地运行</small>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" type="button"
                aria-controls="sidePanel" aria-expanded="true" title="收起侧栏">
          <span aria-hidden="true"></span>
        </button>
      </div>

      <button class="new-chat" id="newChatButton" type="button" title="新建对话">
        <span aria-hidden="true">+</span>
        <span>新对话</span>
      </button>

      <div class="conversation-section">
        <div class="sidebar-label">最近对话</div>
        <div class="conversation-list" id="conversationList" aria-label="历史对话"></div>
      </div>
      <div class="sidebar-space" aria-hidden="true"></div>
    </aside>

    <!-- 侧边栏遮罩（移动端） -->
    <button class="sidebar-backdrop" id="sidebarBackdrop" type="button" aria-label="关闭侧栏"></button>

    <!-- 主聊天区域 -->
    <section class="chat-panel" aria-label="AI 对话">
      <header class="chat-header">
        <div class="header-title">
          <button class="mobile-sidebar-button" id="mobileSidebarButton"
                  type="button" aria-label="打开侧栏">
            <span></span>
          </button>
          <div>
            <p>AI Assistant</p>
            <h1 id="siteHeading">把想法变清楚</h1>
          </div>
        </div>

        <div class="header-actions">
          <!-- 主题切换 -->
          <button class="theme-toggle" id="themeToggle" data-theme-toggle
                  type="button" aria-label="切换深色模式" aria-pressed="false">
            <span aria-hidden="true">☾</span>
          </button>

          <!-- 模型选择（原生下拉框） -->
          <select class="model-select native-model-select" id="modelSelect"
                  aria-label="选择模型" disabled>
            <option value="">默认模型</option>
          </select>
        </div>
      </header>

      <!-- 消息列表 -->
      <div class="messages" id="messages" aria-live="polite"></div>

      <!-- 输入区域 -->
      <form class="composer" id="chatForm">
        <div class="composer-inner">
          <!-- 附件按钮（可上传图片/文件） -->
          <label class="attach-button" for="fileInput" title="上传附件">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
            </svg>
            <input type="file" id="fileInput" multiple accept="image/*,.txt,.md,.csv,.json,.xml,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx"
                   style="display:none" />
          </label>

          <!-- 消息文本框 -->
          <textarea id="userInput" rows="1"
                    placeholder="输入消息… (Enter 发送，Shift+Enter 换行)"
                    required></textarea>

          <!-- 发送按钮 -->
          <button type="submit" class="send-button" id="sendButton"
                  aria-label="发送消息" title="发送">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="composer-hint">MinAI 不会保存你的 API 密钥，所有对话仅存储在本地。</p>
      </form>
    </section>
  </main>

  <!-- 前端交互脚本 -->
  <script src="/app.js?v=20260516-dark-ghost-fix"></script>
</body>
</html>
