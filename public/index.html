<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinAI - 个人 AI 助手</title>
  <style>
    :root {
      --bg: #ffffff; --bg2: #f3f4f6; --text: #1f2937; --text2: #6b7280;
      --border: #e5e7eb; --hover: #f9fafb; --primary: #3b82f6; --primary-hover: #2563eb;
      --danger: #ef4444; --danger-hover: #dc2626; --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --msg-user-bg: #eff6ff; --msg-ai-bg: #f9fafb; --code-bg: #1e293b;
      --radius: 12px; --transition: 0.2s ease;
    }
    .dark {
      --bg: #111827; --bg2: #1f2937; --text: #f3f4f6; --text2: #9ca3af;
      --border: #374151; --hover: #1f2937; --shadow: 0 4px 12px rgba(0,0,0,0.4);
      --msg-user-bg: #1e3a5f; --msg-ai-bg: #1f2937; --code-bg: #0f172a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
    }
    .app-shell { display: flex; height: 100vh; }
    /* 侧边栏 */
    .side-panel {
      width: 280px; background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; transition: transform var(--transition);
    }
    .side-panel.collapsed { transform: translateX(-100%); position: absolute; z-index: 50; height: 100%; }
    .brand {
      display: flex; align-items: center; padding: 16px; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .brand-copy strong { font-size: 1.2rem; display: block; }
    .brand-copy small { color: var(--text2); font-size: 0.75rem; }
    .sidebar-toggle {
      margin-left: auto; background: none; border: none; color: var(--text2);
      font-size: 1.2rem; cursor: pointer;
    }
    .new-chat {
      margin: 12px; padding: 10px; background: var(--primary); color: white;
      border: none; border-radius: var(--radius); font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .new-chat:hover { background: var(--primary-hover); }
    .conversation-section {
      flex: 1; overflow-y: auto; padding: 0 8px;
    }
    .sidebar-label {
      font-size: 0.75rem; color: var(--text2); padding: 8px 12px; text-transform: uppercase;
    }
    .conversation-list { display: flex; flex-direction: column; gap: 2px; }
    .conv-item {
      padding: 10px 12px; border-radius: var(--radius); cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.9rem;
    }
    .conv-item:hover { background: var(--hover); }
    .conv-item.active { background: var(--border); }
    .conv-item .title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .conv-item .actions button {
      background: none; border: none; color: var(--text2); cursor: pointer; padding: 2px 4px;
    }
    .sidebar-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 40;
    }
    /* 主聊天区 */
    .chat-panel {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    .chat-header {
      display: flex; align-items: center; padding: 12px 20px;
      border-bottom: 1px solid var(--border); gap: 12px;
    }
    .mobile-sidebar-button {
      display: none; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer;
    }
    .header-title { flex: 1; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .theme-toggle {
      background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer;
    }
    .config-button {
      background: var(--primary); color: white; border: none; padding: 6px 14px;
      border-radius: 20px; font-size: 0.9rem; cursor: pointer; font-weight: 500;
    }
    .messages {
      flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px;
    }
    .msg-row { display: flex; gap: 12px; max-width: 90%; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.ai { align-self: flex-start; }
    .msg-bubble {
      padding: 10px 16px; border-radius: var(--radius); line-height: 1.5;
      background: var(--msg-user-bg); color: var(--text);
    }
    .msg-row.ai .msg-bubble { background: var(--msg-ai-bg); }
    .msg-row pre {
      background: var(--code-bg); color: #e2e8f0; padding: 12px; border-radius: 8px;
      overflow-x: auto; margin: 8px 0 0; font-size: 0.9rem;
    }
    .msg-row code { font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
    /* 输入区 */
    .composer {
      padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg);
    }
    .composer-inner {
      display: flex; align-items: flex-end; gap: 10px; background: var(--bg2);
      border-radius: var(--radius); padding: 8px 12px;
    }
    .attach-button {
      background: none; border: none; color: var(--text2); cursor: pointer; padding: 8px;
    }
    .attach-button:hover { color: var(--primary); }
    textarea {
      flex: 1; background: transparent; border: none; resize: none; outline: none;
      color: var(--text); font-size: 1rem; max-height: 150px; padding: 8px 0;
    }
    .send-button {
      background: var(--primary); color: white; border: none; border-radius: 50%;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .send-button:hover { background: var(--primary-hover); }
    .composer-hint {
      font-size: 0.7rem; color: var(--text2); margin-top: 6px; text-align: center;
    }
    /* 配置面板（右侧滑出） */
    .config-panel {
      position: fixed; top: 0; right: 0; width: 400px; height: 100vh;
      background: var(--bg2); box-shadow: var(--shadow); transform: translateX(100%);
      transition: transform var(--transition); z-index: 100; padding: 20px;
      overflow-y: auto; border-left: 1px solid var(--border);
    }
    .config-panel.open { transform: translateX(0); }
    .config-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99;
    }
    .config-backdrop.visible { display: block; }
    .config-panel h2 { margin-bottom: 16px; font-size: 1.3rem; }
    .provider-list { display: flex; flex-direction: column; gap: 16px; }
    .provider-card {
      background: var(--bg); border-radius: var(--radius); padding: 16px;
      border: 1px solid var(--border);
    }
    .provider-card .row {
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;
    }
    .provider-card input, .provider-card select {
      flex: 1; min-width: 120px; padding: 8px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg2); color: var(--text);
    }
    .provider-card button {
      padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer;
      background: var(--primary); color: white; font-weight: 500;
    }
    .provider-card button.danger { background: var(--danger); }
    .add-provider-btn {
      margin-top: 16px; background: var(--primary); color: white; border: none;
      padding: 10px 20px; border-radius: var(--radius); width: 100%; font-weight: 600;
    }
    /* 移动端适配 */
    @media (max-width: 768px) {
      .side-panel { position: absolute; z-index: 50; height: 100%; }
      .side-panel.collapsed { display: none; }
      .mobile-sidebar-button { display: block; }
      .config-panel { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app-shell" id="appShell">
    <!-- 侧边栏 -->
    <aside class="side-panel" id="sidePanel" aria-label="会话列表">
      <div class="brand">
        <div class="brand-copy">
          <strong>MinAI</strong>
          <small>个人助手</small>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" type="button" title="收起侧栏">×</button>
      </div>
      <button class="new-chat" id="newChatButton">+ 新对话</button>
      <div class="conversation-section">
        <div class="sidebar-label">最近对话</div>
        <div class="conversation-list" id="conversationList"></div>
      </div>
    </aside>
    <button class="sidebar-backdrop" id="sidebarBackdrop"></button>

    <!-- 聊天区 -->
    <section class="chat-panel">
      <header class="chat-header">
        <button class="mobile-sidebar-button" id="mobileSidebarButton">☰</button>
        <div class="header-title">
          <h1 id="siteHeading" style="font-size:1.2rem;">AI Assistant</h1>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" id="themeToggle" title="切换深色模式">☾</button>
          <button class="config-button" id="openConfigButton">⚙️ API 配置</button>
        </div>
      </header>
      <div class="messages" id="messages" aria-live="polite"></div>
      <form class="composer" id="chatForm">
        <div class="composer-inner">
          <label class="attach-button" for="fileInput" title="上传附件">📎</label>
          <input type="file" id="fileInput" multiple accept="image/*,.txt,.md,.csv,.json,.xml,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx" style="display:none">
          <textarea id="userInput" rows="1" placeholder="输入消息… (Enter 发送，Shift+Enter 换行)" required></textarea>
          <button type="submit" class="send-button" id="sendButton" title="发送">➤</button>
        </div>
        <p class="composer-hint">API Key 仅保存在本地服务器，不会外传。</p>
      </form>
    </section>
  </main>

  <!-- 配置面板（右侧滑出） -->
  <div class="config-backdrop" id="configBackdrop"></div>
  <div class="config-panel" id="configPanel">
    <h2>API 通道管理</h2>
    <div class="provider-list" id="providerList"></div>
    <button class="add-provider-btn" id="addProviderBtn">+ 添加新通道</button>
  </div>

  <script>
    (function() {
      // ---- 全局状态 ----
      let currentConversationId = null;
      let conversations = [];
      let providers = [];

      // ---- DOM 元素 ----
      const el = (id) => document.getElementById(id);
      const sidePanel = el('sidePanel');
      const messagesDiv = el('messages');
      const userInput = el('userInput');
      const conversationList = el('conversationList');
      const configPanel = el('configPanel');
      const configBackdrop = el('configBackdrop');
      const providerList = el('providerList');
      const themeToggle = el('themeToggle');

      // ---- 初始化 ----
      async function init() {
        await loadConversations();
        await loadProviders();
        bindEvents();
        applyTheme();
      }

      async function api(url, options = {}) {
        const res = await fetch(url, {
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        return res.json();
      }

      // ---- 主题 ----
      function applyTheme() {
        const dark = localStorage.getItem('dark') === '1';
        document.documentElement.classList.toggle('dark', dark);
        themeToggle.textContent = dark ? '☀' : '☾';
      }
      themeToggle.addEventListener('click', () => {
        const isDark = !document.documentElement.classList.contains('dark');
        document.documentElement.classList.toggle('dark', isDark);
        localStorage.setItem('dark', isDark ? '1' : '0');
        themeToggle.textContent = isDark ? '☀' : '☾';
      });

      // ---- 对话管理 ----
      async function loadConversations() {
        const data = await api('/api/conversations');
        currentConversationId = data.activeId;
        conversations = data.conversations || [];
        renderConversationList();
        if (data.messages) renderMessages(data.messages);
      }

      function renderConversationList() {
        conversationList.innerHTML = conversations.map(c => `
          <div class="conv-item ${c.id === currentConversationId ? 'active' : ''}" data-id="${c.id}">
            <span class="title">${escapeHtml(c.title)}</span>
            <div class="actions">
              <button class="pin-btn" title="置顶">${c.pinned ? '📌' : '📍'}</button>
              <button class="delete-btn" title="删除">🗑️</button>
            </div>
          </div>
        `).join('');
      }

      function renderMessages(messages) {
        messagesDiv.innerHTML = messages.map(msg => {
          const role = msg.role;
          const content = msg.content || '';
          const formatted = formatContent(content);
          return `<div class="msg-row ${role}"><div class="msg-bubble">${formatted}</div></div>`;
        }).join('');
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      function formatContent(text) {
        // 简单的 Markdown 渲染（代码块和粗体等）
        let html = escapeHtml(text);
        // 代码块 ```
        html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
          return `<pre><code class="language-${lang || ''}">${escapeHtml(code)}</code></pre>`;
        });
        // 行内代码
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        // 粗体
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // 换行
        html = html.replace(/\n/g, '<br>');
        return html;
      }

      function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      // ---- 事件绑定 ----
      function bindEvents() {
        // 新对话
        el('newChatButton').addEventListener('click', async () => {
          const data = await api('/api/conversations/new', { method: 'POST' });
          currentConversationId = data.activeId;
          conversations = data.conversations;
          renderConversationList();
          renderMessages([]);
        });

        // 切换对话
        conversationList.addEventListener('click', async (e) => {
          const item = e.target.closest('.conv-item');
          if (!item) return;
          const id = item.dataset.id;
          if (e.target.classList.contains('delete-btn')) {
            await api('/api/conversations', {
              method: 'DELETE',
              body: JSON.stringify({ conversationId: id })
            });
            return loadConversations();
          }
          if (e.target.classList.contains('pin-btn')) {
            const isPinned = e.target.textContent === '📌';
            await api('/api/conversations/pin', {
              method: 'POST',
              body: JSON.stringify({ conversationId: id, pinned: !isPinned })
            });
            return loadConversations();
          }
          const data = await api('/api/conversations/select', {
            method: 'POST',
            body: JSON.stringify({ conversationId: id })
          });
          currentConversationId = id;
          conversations = data.conversations;
          renderConversationList();
          renderMessages(data.messages || []);
        });

        // 发送消息
        el('chatForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const text = userInput.value.trim();
          if (!text) return;
          userInput.value = '';
          // 显示用户消息
          const userMsg = { role: 'user', content: text };
          renderMessages([...getCurrentMessages(), userMsg]);
          messagesDiv.scrollTop = messagesDiv.scrollHeight;

          const res = await api('/api/chat', {
            method: 'POST',
            body: JSON.stringify({
              messages: [...getCurrentMessages(), userMsg],
              conversationId: currentConversationId,
            })
          });
          if (res.error) {
            alert(res.error);
            return;
          }
          currentConversationId = res.conversationId;
          conversations = res.conversations;
          renderConversationList();
          renderMessages([...getCurrentMessages(), { role: 'assistant', content: res.reply }]);
        });

        // 移动端侧边栏
        el('mobileSidebarButton').addEventListener('click', () => sidePanel.classList.toggle('collapsed'));
        el('sidebarBackdrop').addEventListener('click', () => sidePanel.classList.add('collapsed'));

        // 配置面板
        el('openConfigButton').addEventListener('click', () => {
          configPanel.classList.add('open');
          configBackdrop.classList.add('visible');
          renderProviderList();
        });
        configBackdrop.addEventListener('click', () => {
          configPanel.classList.remove('open');
          configBackdrop.classList.remove('visible');
        });
        el('addProviderBtn').addEventListener('click', addProvider);
      }

      function getCurrentMessages() {
        // 从当前渲染的消息中提取（简化处理，实际可从 store 获取）
        const msgElements = messagesDiv.querySelectorAll('.msg-row');
        return Array.from(msgElements).map(el => ({
          role: el.classList.contains('user') ? 'user' : 'assistant',
          content: el.querySelector('.msg-bubble').innerText
        }));
      }

      // ---- API 通道管理 ----
      async function loadProviders() {
        const data = await api('/api/providers');
        providers = data.providers || [];
        renderProviderList();
      }

      function renderProviderList() {
        if (providers.length === 0) {
          providerList.innerHTML = '<p style="color: var(--text2);">尚未配置 API 通道，请添加一个。</p>';
          return;
        }
        providerList.innerHTML = providers.map(p => `
          <div class="provider-card" data-id="${p.id}">
            <div class="row">
              <input type="text" placeholder="名称" value="${escapeHtml(p.name)}" class="pname">
              <input type="text" placeholder="API Host" value="${escapeHtml(p.apiHost || '')}" class="phost">
            </div>
            <div class="row">
              <input type="text" placeholder="API Path (可选)" value="${escapeHtml(p.apiPath || '')}" class="ppath">
              <input type="password" placeholder="API Key" value="${p.apiKeySet ? '********' : ''}" class="pkey">
            </div>
            <div class="row">
              <input type="text" placeholder="模型" value="${escapeHtml(p.aiModel || '')}" class="pmodel">
              <select class="penabled">
                <option value="1" ${p.enabled ? 'selected' : ''}>启用</option>
                <option value="0" ${!p.enabled ? 'selected' : ''}>禁用</option>
              </select>
              <label><input type="checkbox" class="pdefault" ${p.isDefault ? 'checked' : ''}> 默认</label>
            </div>
            <div class="row" style="justify-content: flex-end;">
              <button class="save-provider">保存</button>
              <button class="danger delete-provider">删除</button>
            </div>
          </div>
        `).join('');

        // 事件委托
        providerList.querySelectorAll('.provider-card').forEach(card => {
          const id = card.dataset.id;
          card.querySelector('.save-provider').addEventListener('click', () => saveProvider(id, card));
          card.querySelector('.delete-provider').addEventListener('click', () => deleteProvider(id));
        });
      }

      async function saveProvider(id, card) {
        const name = card.querySelector('.pname').value.trim();
        const apiHost = card.querySelector('.phost').value.trim();
        const apiPath = card.querySelector('.ppath').value.trim();
        const apiKey = card.querySelector('.pkey').value === '********' ? null : card.querySelector('.pkey').value;
        const aiModel = card.querySelector('.pmodel').value.trim();
        const enabled = card.querySelector('.penabled').value === '1';
        const isDefault = card.querySelector('.pdefault').checked;

        const body = { name, apiHost, apiPath, aiModel, enabled, isDefault };
        if (apiKey !== null) body.apiKey = apiKey;

        const res = await api(`/api/providers/${id}`, {
          method: 'PUT',
          body: JSON.stringify(body)
        });
        if (res.provider) {
          await loadProviders();
          alert('保存成功');
        } else {
          alert('保存失败：' + (res.error || '未知错误'));
        }
      }

      async function deleteProvider(id) {
        if (!confirm('确定删除该通道吗？')) return;
        await api(`/api/providers/${id}`, { method: 'DELETE' });
        await loadProviders();
      }

      async function addProvider() {
        const res = await api('/api/providers', {
          method: 'POST',
          body: JSON.stringify({
            name: '新通道',
            apiHost: 'https://api.openai.com',
            apiKey: '',
            aiModel: 'gpt-4o-mini',
            enabled: true,
            isDefault: providers.length === 0,
          })
        });
        if (res.provider) {
          await loadProviders();
        } else {
          alert('添加失败: ' + (res.error || ''));
        }
      }

      // 启动
      init();
    })();
  </script>
</body>
</html>
