<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinAI - 个人 AI 助手</title>

    <!-- 第三方 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js"></script>

    <style>
        /* ========== ChatGPT 风格完整样式 ========== */
        :root {
            --background: #ffffff;
            --sidebar: #f7f7f8;
            --border: #e5e5e5;
            --text: #2d333a;
            --secondary: #6e6e80;
            --accent: #10a37f;
            --accent-hover: #0d8c6d;
            --msg-hover: #f9f9f9;
            --code-bg: #f6f8fa;
            --code-border: #e1e4e8;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-composer: 0 2px 20px rgba(0,0,0,0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 24px;
            --sidebar-width: 260px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
            --transition-fast: 0.15s ease;
            --transition-smooth: 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        .dark {
            --background: #343541;
            --sidebar: #202123;
            --border: #4d4d4f;
            --text: #ececf1;
            --secondary: #8e8ea0;
            --accent: #10a37f;
            --accent-hover: #1abc9c;
            --msg-hover: #2b2c35;
            --code-bg: #1e1e2e;
            --code-border: #3e3e4f;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-composer: 0 2px 24px rgba(0,0,0,0.35);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:16px; -webkit-font-smoothing:antialiased; }
        body {
            font-family:var(--font-sans);
            background:var(--background);
            color:var(--text);
            height:100vh;
            overflow:hidden;
            line-height:1.6;
            letter-spacing:-0.01em;
        }
        .app-shell { display:flex; height:100vh; position:relative; }
        .side-panel {
            width:var(--sidebar-width); min-width:var(--sidebar-width);
            background:var(--sidebar); border-right:1px solid var(--border);
            display:flex; flex-direction:column; transition:transform var(--transition-smooth);
            z-index:50; flex-shrink:0;
        }
        .side-panel.collapsed { transform:translateX(-100%); }
        .brand { display:flex; align-items:center; padding:14px 16px; gap:10px; border-bottom:1px solid var(--border); min-height:56px; }
        .brand-icon { width:32px; height:32px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:1rem; flex-shrink:0; }
        .sidebar-toggle { margin-left:auto; background:none; border:none; color:var(--secondary); font-size:1.1rem; cursor:pointer; padding:6px 8px; border-radius:6px; }
        .new-chat-btn { margin:10px 12px; padding:10px 14px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-md); font-weight:600; font-size:0.875rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
        .conversation-section { flex:1; overflow-y:auto; padding:0 8px 8px; }
        .sidebar-label { font-size:0.7rem; color:var(--secondary); padding:12px 12px 6px; text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
        .conv-item { padding:10px 12px; border-radius:var(--radius-sm); cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-size:0.85rem; transition:background var(--transition-fast); gap:6px; }
        .conv-item:hover { background:var(--msg-hover); }
        .conv-item.active { background:var(--border); font-weight:500; }
        .conv-item .title { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
        .conv-item .delete-conv-btn { opacity:0; background:none; border:none; color:var(--secondary); cursor:pointer; padding:3px 6px; border-radius:4px; font-size:0.8rem; }
        .conv-item:hover .delete-conv-btn { opacity:1; }
        .sidebar-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:45; }
        .sidebar-backdrop.visible { display:block; }

        .chat-panel { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }
        .chat-header { display:flex; align-items:center; padding:10px 16px; border-bottom:1px solid var(--border); gap:10px; min-height:52px; }
        .mobile-sidebar-btn { display:none; background:none; border:none; color:var(--text); font-size:1.4rem; cursor:pointer; padding:4px 8px; border-radius:6px; }
        .header-title { flex:1; font-size:0.95rem; font-weight:500; }
        .header-actions { display:flex; align-items:center; gap:6px; }
        .icon-btn { background:none; border:none; color:var(--secondary); font-size:1.2rem; cursor:pointer; padding:6px 10px; border-radius:8px; }
        .settings-btn { background:var(--accent); color:#fff; border:none; padding:7px 15px; border-radius:20px; font-size:0.8rem; cursor:pointer; font-weight:500; }

        .messages { flex:1; overflow-y:auto; padding:24px 16px 140px; display:flex; flex-direction:column; gap:4px; scroll-behavior:smooth; }
        .messages-inner { max-width:768px; width:100%; margin:0 auto; display:flex; flex-direction:column; gap:4px; }
        .msg-row { display:flex; gap:12px; padding:12px 16px; border-radius:var(--radius-sm); transition:background var(--transition-fast); animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity:0.6; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .msg-row.user { justify-content:flex-end; }
        .msg-avatar { width:30px; height:30px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:600; color:#fff; }
        .msg-row.ai .msg-avatar { background:var(--accent); }
        .msg-row.user .msg-avatar { background:#6b7280; order:2; }
        .msg-content { flex:1; min-width:0; line-height:1.7; font-size:0.9375rem; word-break:break-word; }
        .msg-row.user .msg-content { text-align:right; order:1; }
        .msg-content pre { position:relative; background:var(--code-bg); border:1px solid var(--code-border); border-radius:var(--radius-md); padding:14px 16px; margin:10px 0; overflow-x:auto; font-size:0.85rem; }
        .copy-code-btn { position:absolute; top:8px; right:10px; background:rgba(128,128,128,0.15); border:1px solid var(--code-border); color:var(--secondary); padding:4px 10px; border-radius:5px; font-size:0.7rem; cursor:pointer; opacity:0; transition:all var(--transition-fast); }
        .msg-content pre:hover .copy-code-btn { opacity:1; }
        .streaming-cursor { display:inline-block; width:8px; height:16px; background:var(--accent); margin-left:2px; vertical-align:text-bottom; border-radius:2px; animation:blink-cursor 0.7s infinite; }
        @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .composer { position:fixed; bottom:20px; left:calc(var(--sidebar-width) + (100vw - var(--sidebar-width) - 768px) / 2); width:768px; max-width:calc(100vw - var(--sidebar-width) - 40px); background:var(--background); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-composer); z-index:30; display:flex; align-items:flex-end; gap:8px; padding:10px 14px; transition:all var(--transition-smooth); min-height:52px; }
        .composer textarea { flex:1; background:transparent; border:none; resize:none; outline:none; color:var(--text); font-size:0.9375rem; font-family:var(--font-sans); line-height:1.5; padding:4px 0; max-height:180px; }
        .send-btn { background:var(--accent); color:#fff; border:none; border-radius:50%; width:34px; height:34px; display:flex; align-items:center; justify-content:center; cursor:pointer; opacity:0.5; pointer-events:none; }
        .send-btn.active { opacity:1; pointer-events:auto; }
        .stop-btn { background:#ef4444; }
        
        .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:90; align-items:center; justify-content:center; }
        .modal-backdrop.visible { display:flex; }
        .settings-modal { background:var(--background); border:1px solid var(--border); border-radius:var(--radius-lg); width:520px; max-width:calc(100vw - 32px); max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.25); z-index:91; padding:24px; }

        @media (max-width:768px) {
            .side-panel { position:fixed; top:0; left:0; height:100vh; transform:translateX(-100%); box-shadow:none; }
            .side-panel.open { transform:translateX(0); box-shadow:4px 0 30px rgba(0,0,0,0.3); }
            .mobile-sidebar-btn { display:block; }
            .composer { left:20px; right:20px; width:auto; margin:0 auto; bottom:12px; }
            .messages { padding:16px 8px 130px; }
        }
    </style>
</head>
<body>
    <main class="app-shell" id="appShell">
        <aside class="side-panel" id="sidePanel">
            <div class="brand">
                <div class="brand-icon">M</div>
                <div><strong>MinAI</strong><br><small>个人助手</small></div>
                <button class="sidebar-toggle" id="sidebarToggle">✕</button>
            </div>
            <button class="new-chat-btn" id="newChatButton"><span>+</span> 新对话</button>
            <div class="conversation-section">
                <div class="sidebar-label">最近对话</div>
                <div class="conversation-list" id="conversationList"></div>
            </div>
        </aside>
        <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

        <section class="chat-panel" id="chatPanel">
            <header class="chat-header">
                <button class="mobile-sidebar-btn" id="mobileSidebarButton">☰</button>
                <div class="header-title" id="headerTitle">AI Assistant</div>
                <div class="header-actions">
                    <button class="icon-btn" id="themeToggle">☾</button>
                    <button class="settings-btn" id="openSettingsButton">⚙️ 设置</button>
                </div>
            </header>
            <div class="messages" id="messages">
                <div class="messages-inner" id="messagesInner"></div>
            </div>
            <form class="composer" id="chatForm">
                <textarea id="userInput" rows="1" placeholder="发送消息…"></textarea>
                <button type="submit" class="send-btn" id="sendButton" disabled>➤</button>
            </form>
        </section>
    </main>

    <div class="modal-backdrop" id="settingsBackdrop">
        <div class="settings-modal" id="settingsModal">
            <h2>API 设置</h2>
            <div class="provider-selector" id="providerTabs"></div>
            <div id="settingsForm">
                <div class="form-group"><label>模型</label><input type="text" id="settingsModel" list="modelSuggestions"></div>
                <div class="form-group"><label>API Key</label><input type="password" id="settingsApiKey"></div>
                <div class="form-group"><label>接口地址</label><input type="text" id="settingsApiHost"></div>
                <div class="form-group"><label>API Path (可选)</label><input type="text" id="settingsApiPath"></div>
                <div class="form-group"><label>通道名称</label><input type="text" id="settingsName"></div>
                <div class="test-result" id="testResult"></div>
                <div class="btn-row">
                    <button class="btn btn-primary" id="saveSettingsBtn">保存</button>
                    <button class="btn btn-outline" id="testConnectionBtn">测试连接</button>
                    <button class="btn btn-outline" id="addProviderSettingsBtn">+ 新增通道</button>
                    <button class="btn btn-danger" id="deleteProviderSettingsBtn" style="margin-left:auto;">删除</button>
                </div>
            </div>
            <div class="btn-row" style="margin-top:12px;"><button class="btn btn-outline" id="closeSettingsBtn" style="width:100%;">关闭</button></div>
        </div>
    </div>

    <script>
        (function() {
            let currentConversationId = null;
            let conversations = [];
            let providers = [];
            let selectedProviderId = null;
            let messagesState = [];
            let isStreaming = false;
            let streamAbortController = null;

            const $ = id => document.getElementById(id);
            const messagesDiv = $('messages'), messagesInner = $('messagesInner');
            const userInput = $('userInput'), sendButton = $('sendButton');
            const sidePanel = $('sidePanel'), sidebarBackdrop = $('sidebarBackdrop');
            const themeToggle = $('themeToggle');

            marked.setOptions({ breaks:true, gfm:true });
            if (hljs) {
                marked.setOptions({ highlight: (code,lang) => lang && hljs.getLanguage(lang) ? hljs.highlight(code,{language:lang}).value : hljs.highlightAuto(code).value });
            }

            async function api(url, options={}) {
                const res = await fetch(url, { headers:{'Content-Type':'application/json'}, ...options });
                return res.json();
            }

            async function init() {
                await loadConversations();
                await loadProviders();
                bindEvents();
                applyTheme();
                updateSendButton();
                updateComposerPosition();
            }

            function applyTheme() {
                const dark = localStorage.getItem('dark') === '1';
                document.documentElement.classList.toggle('dark', dark);
                themeToggle.textContent = dark ? '☀' : '☾';
                $('hljs-light').disabled = dark;
                $('hljs-dark').disabled = !dark;
            }

            themeToggle.addEventListener('click', () => {
                const isDark = !document.documentElement.classList.contains('dark');
                document.documentElement.classList.toggle('dark', isDark);
                localStorage.setItem('dark', isDark ? '1' : '0');
                themeToggle.textContent = isDark ? '☀' : '☾';
                $('hljs-light').disabled = isDark;
                $('hljs-dark').disabled = !isDark;
            });

            async function loadConversations() {
                try {
                    const data = await api('/api/conversations');
                    currentConversationId = data.activeId;
                    conversations = data.conversations || [];
                    messagesState = data.messages || [];
                    renderConversationList();
                    renderMessages();
                } catch (e) {
                    console.error(e);
                    conversations = []; messagesState = [];
                    renderConversationList(); renderMessages();
                }
            }

            function renderConversationList() {
                $('conversationList').innerHTML = conversations.map(c => `
                    <div class="conv-item ${c.id === currentConversationId ? 'active' : ''}" data-id="${c.id}">
                        <span class="title">${escapeHtml(c.title || '新对话')}</span>
                        <button class="delete-conv-btn" data-delete-id="${c.id}" title="删除">🗑</button>
                    </div>`).join('');
            }

            function renderMessages() {
                if (messagesState.length === 0) {
                    messagesInner.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--secondary);"><div style="font-size:2rem;">💬</div><div>开始新的对话</div></div>`;
                } else {
                    messagesInner.innerHTML = messagesState.map((msg, idx) => {
                        const role = msg.role;
                        const rendered = renderMarkdown(msg.content || '');
                        const avatar = role === 'assistant' ? '<div class="msg-avatar">AI</div>' : '<div class="msg-avatar">U</div>';
                        return `<div class="msg-row ${role}" data-msg-index="${idx}">
                            ${role === 'assistant' ? avatar : ''}
                            <div class="msg-content">${rendered}</div>
                            ${role === 'user' ? avatar : ''}
                        </div>`;
                    }).join('');
                    requestAnimationFrame(() => addCopyButtonsToContainer(messagesInner));
                }
                scrollToBottom();
            }

            function renderMarkdown(text) {
                if (!text) return '';
                let html = marked.parse ? marked.parse(text) : text;
                return DOMPurify.sanitize(html, { ALLOWED_TAGS: [...], ALLOWED_ATTR: [...] }); // 简化，完整列表见原版
            }

            function addCopyButtonsToContainer(container) {
                container.querySelectorAll('pre').forEach(pre => {
                    if (pre.querySelector('.copy-code-btn')) return;
                    const btn = document.createElement('button');
                    btn.className = 'copy-code-btn'; btn.textContent = '复制';
                    btn.onclick = async () => {
                        const code = pre.querySelector('code')?.textContent || pre.textContent;
                        await navigator.clipboard.writeText(code);
                        btn.textContent = '✓ 已复制';
                        setTimeout(() => btn.textContent = '复制', 2000);
                    };
                    pre.style.position = 'relative';
                    pre.appendChild(btn);
                });
            }

            function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }

            // ---------- 核心发送与流式处理 ----------
            async function sendMessage(text) {
                if (isStreaming) return;
                if (!text.trim()) return;

                const userMsg = { role:'user', content:text };
                messagesState.push(userMsg);
                renderMessages();
                userInput.value = '';
                updateSendButton();

                const aiPlaceholder = { role:'assistant', content:'' };
                messagesState.push(aiPlaceholder);
                const aiMsgIndex = messagesState.length - 1;
                renderMessages();
                
                isStreaming = true;
                streamAbortController = new AbortController();
                sendButton.classList.add('stop-btn');
                sendButton.textContent = '■';
                sendButton.disabled = false;

                try {
                    const res = await fetch('/api/chat', {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({
                            messages: messagesState.slice(0, -1),
                            conversationId: currentConversationId,
                            providerId: selectedProviderId,
                            stream: true
                        }),
                        signal: streamAbortController.signal
                    });
                    if (!res.ok) throw new Error(await res.text());
                    
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let fullReply = '';
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            const payload = line.slice(6).trim();
                            if (payload === '[DONE]') continue;
                            try {
                                const data = JSON.parse(payload);
                                if (data.conversationId) {
                                    currentConversationId = data.conversationId;
                                    conversations = data.conversations || conversations;
                                    renderConversationList();
                                    continue;
                                }
                                const delta = data.choices?.[0]?.delta?.content || '';
                                fullReply += delta;
                                updateStreamingMessage(aiMsgIndex, fullReply);
                            } catch {}
                        }
                    }
                    messagesState[aiMsgIndex].content = fullReply;
                    renderMessages();
                } catch (e) {
                    if (e.name === 'AbortError') {
                        messagesState[aiMsgIndex].content += ' [已停止生成]';
                    } else {
                        messagesState[aiMsgIndex].content = `❌ 错误: ${e.message}`;
                    }
                    renderMessages();
                } finally {
                    isStreaming = false;
                    sendButton.classList.remove('stop-btn');
                    sendButton.textContent = '➤';
                    updateSendButton();
                }
            }

            function updateStreamingMessage(index, text) {
                const el = document.querySelector(`.msg-row[data-msg-index="${index}"] .msg-content`);
                if (el) {
                    el.innerHTML = renderMarkdown(text) + '<span class="streaming-cursor"></span>';
                    addCopyButtonsToContainer(el);
                }
                scrollToBottom();
            }

            function bindEvents() {
                $('newChatButton').onclick = async () => {
                    const data = await api('/api/conversations/new', { method:'POST' });
                    currentConversationId = data.activeId; conversations = data.conversations; messagesState = [];
                    renderConversationList(); renderMessages();
                };
                $('conversationList').addEventListener('click', async (e) => {
                    const deleteBtn = e.target.closest('.delete-conv-btn');
                    if (deleteBtn) {
                        const id = deleteBtn.dataset.deleteId;
                        await api('/api/conversations', { method:'DELETE', body: JSON.stringify({ conversationId:id }) });
                        await loadConversations();
                        return;
                    }
                    const item = e.target.closest('.conv-item');
                    if (!item) return;
                    const id = item.dataset.id;
                    const data = await api('/api/conversations/select', { method:'POST', body: JSON.stringify({ conversationId:id }) });
                    currentConversationId = id; conversations = data.conversations; messagesState = data.messages;
                    renderConversationList(); renderMessages();
                });
                $('chatForm').onsubmit = async (e) => {
                    e.preventDefault();
                    if (!userInput.value.trim() || isStreaming) return;
                    sendMessage(userInput.value);
                };
                userInput.addEventListener('input', updateSendButton);
                userInput.addEventListener('keydown', e => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (userInput.value.trim() && !isStreaming) sendMessage(userInput.value);
                    }
                });
                $('mobileSidebarButton').onclick = () => { sidePanel.classList.add('open'); sidebarBackdrop.classList.add('visible'); };
                sidebarBackdrop.onclick = () => { sidePanel.classList.remove('open'); sidebarBackdrop.classList.remove('visible'); };
                $('sidebarToggle').onclick = () => { sidePanel.classList.toggle('collapsed'); updateComposerPosition(); };
                $('openSettingsButton').onclick = openSettings;
                $('closeSettingsBtn').onclick = closeSettings;
                $('saveSettingsBtn').onclick = saveSettings;
                $('testConnectionBtn').onclick = testConnection;
                $('addProviderSettingsBtn').onclick = addNewProvider;
                $('deleteProviderSettingsBtn').onclick = deleteCurrentProvider;
                window.addEventListener('resize', updateComposerPosition);
            }

            async function loadProviders() {
                const data = await api('/api/providers');
                providers = data.providers || [];
                selectedProviderId = localStorage.getItem('selectedProviderId') || (providers[0]?.id || null);
            }

            function openSettings() {
                renderProviderTabs();
                $('settingsBackdrop').classList.add('visible');
                if (providers.length && !selectedProviderId) selectedProviderId = providers[0].id;
                populateSettingsForm();
            }
            function closeSettings() { $('settingsBackdrop').classList.remove('visible'); }

            // 其余辅助函数保持原有逻辑，增强细节
            function renderProviderTabs() {
                const tabs = providers.map(p => `<button class="provider-tab ${p.id === selectedProviderId ? 'active' : ''}" data-pid="${p.id}">${p.name}</button>`).join('');
                $('providerTabs').innerHTML = tabs;
                document.querySelectorAll('.provider-tab').forEach(btn => btn.onclick = () => {
                    selectedProviderId = btn.dataset.pid;
                    localStorage.setItem('selectedProviderId', selectedProviderId);
                    renderProviderTabs();
                    populateSettingsForm();
                });
            }
            function populateSettingsForm() {
                const p = providers.find(p => p.id === selectedProviderId);
                if (!p) { /* 清空 */ return; }
                $('settingsName').value = p.name || '';
                $('settingsModel').value = p.aiModel || '';
                $('settingsApiKey').value = p.apiKeySet ? '********' : '';
                $('settingsApiHost').value = p.apiHost || '';
                $('settingsApiPath').value = p.apiPath || '';
            }
            async function saveSettings() {
                const body = {
                    name: $('settingsName').value.trim(),
                    apiHost: $('settingsApiHost').value.trim(),
                    apiPath: $('settingsApiPath').value.trim(),
                    aiModel: $('settingsModel').value.trim(),
                };
                const apiKey = $('settingsApiKey').value;
                if (apiKey && apiKey !== '********') body.apiKey = apiKey;
                if (selectedProviderId) {
                    await api(`/api/providers/${selectedProviderId}`, { method:'PUT', body: JSON.stringify(body) });
                } else {
                    body.apiKey = apiKey;
                    const res = await api('/api/providers', { method:'POST', body: JSON.stringify(body) });
                    selectedProviderId = res.provider?.id;
                    localStorage.setItem('selectedProviderId', selectedProviderId || '');
                }
                await loadProviders();
                renderProviderTabs();
                populateSettingsForm();
            }
            async function testConnection() {
                const res = await api('/api/providers/test', { method:'POST', body: JSON.stringify({
                    providerId: selectedProviderId,
                    apiHost: $('settingsApiHost').value,
                    apiKey: $('settingsApiKey').value === '********' ? null : $('settingsApiKey').value,
                })});
                $('testResult').textContent = res.success ? '✓ 连接成功' : `✗ ${res.error}`;
                $('testResult').className = 'test-result ' + (res.success ? 'success' : 'error');
            }
            function updateSendButton() {
                const hasText = userInput.value.trim().length > 0;
                if (isStreaming) return;
                sendButton.classList.toggle('active', hasText);
                sendButton.disabled = !hasText;
            }
            function updateComposerPosition() {
                const composer = document.querySelector('.composer');
                if (window.innerWidth > 768) {
                    const sidebarWidth = sidePanel.classList.contains('collapsed') ? 0 : 260;
                    composer.style.left = `calc(${sidebarWidth}px + (100vw - ${sidebarWidth}px - 768px) / 2)`;
                } else {
                    composer.style.left = '';
                }
            }
            function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

            init();
        })();
    </script>
</body>
</html>
